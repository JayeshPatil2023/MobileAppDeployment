name: test-iOS Self Hosted Build

on:
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: [self-hosted, macOS, ARM64]
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
            clean: false

      - name: Select Xcode
        env:
         MACOS_ADMIN_PASSWORD: ${{ secrets.MACOS_ADMIN_PASSWORD }}
        run: |
              echo "$MACOS_ADMIN_PASSWORD" | sudo -S xcode-select -s /Applications/Xcode.app/Contents/Developer
              xcodebuild -version

      - name: Show versions
        run: |
          sw_vers
          xcodebuild -version
          node -v
          npm -v

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # - name: Clean old npm and web folders
      #   run: |
      #     echo "******************* REMOVE FOLDERS FOR NODE MODULES, PLUGINS, WWW AND PLATFORMS *******************"
      #     rm -rf node_modules/ www/ package-lock.json

      # - name: Run npm install
      #   run: |
      #     echo "******************* RUN NPM INSTALL *******************"
      #     npm install
      
      - name: Install npm dependencies
        run: |
              if [ ! -d "node_modules" ]; then
                npm install
              else
                echo "Using existing node_modules"
                npm install
              fi


      - name: npm Build
        run:  npm run build

      - name: Clean iOS
        run: |
            rm -rf ios/App/build
            cd ios/App
            xcodebuild -project App.xcodeproj clean
        
      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install Pods
        run: |
          cd ios/App
          pod install
          cd ../..

      # Assumes run_screenshots.sh and maestro_screenshots.yaml are in the client repo root.
      # Does not repeat npm build / cap sync / pod install.
      - name: Capture iOS App Store screenshots
        env:
          SCREENSHOT_OUTPUT_DIR: ${{ github.workspace }}/screenshots
          # Self-hosted Mac Actions is colder than an interactive Terminal run.
          MAESTRO_TIMEOUT_SEC: "1200"
        run: |
          chmod +x ./run_screenshots.sh
          ./run_screenshots.sh

      # AfterSignIn / Home / failure hierarchies explain CI-only login issues.
      - name: Upload iOS screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots-${{ github.run_number }}
          path: screenshots/
          if-no-files-found: warn
      
